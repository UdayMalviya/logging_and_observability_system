syntax = "proto3";


option go_package = "github.com/UdayMalviya/logging_and_observability_system/schemas/logs/v1;logsv1";


enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  DEBUG = 1;
  INFO = 2;
  WARN = 3;
  ERROR = 4;
}


message LogEvent {
    int64 ts = 1;
    // Epoch timestamp in nanoseconds
  // Constraints:
  // - must be > 0
  // - must not be in the future (allow small skew, e.g. +60s)

  string service = 2;
  // max length: 100
  // recommended pattern: [a-zA-Z0-9._-]+

  LogLevel level = 3;

  string msg = 4;
  // max length: 65500

  // -----------------------------
  // DISTRIBUTED TRACING
  // -----------------------------

  string trace_id = 5; // max 64
  string span_id = 6;  // max 64

  // -----------------------------
  // CONTEXT
  // -----------------------------

  string host = 7;     // max 64
  string env = 8;      // max 32
  string version = 9;  // max 32

  // -----------------------------
  // TAGS
  // -----------------------------

  repeated string tags = 10;
  // Constraints:
  // - max 20 entries
  // - each tag max length 32
  // - no empty strings

  // -----------------------------
  // META (structured attributes)
  // -----------------------------

  map<string, string> meta = 11;
  // Constraints:
  // - max 50 entries
  // - key max length 64
  // - string_value max length 256

  // -----------------------------
  // SCHEMA VERSIONING (CRITICAL)
  // -----------------------------

  string schema_version = 12;
  // must be "1.0"
  // TODO: remove in v2, move to message header or topic versioning

  reserved 13, 14, 15;
}